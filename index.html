<style>
  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --panel-2:#1c232d;
    --line:#2a323d;
    --ink:#e9eef5;
    --muted:#8b97a7;
    --accent:#ff5a8a;
    --accent-soft:rgba(255,90,138,.14);
    --star:#ffc94d;
    --room:#5ec8ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    position:sticky;top:0;z-index:20;
    background:rgba(13,17,23,.86);
    backdrop-filter:saturate(160%) blur(14px);
    -webkit-backdrop-filter:saturate(160%) blur(14px);
    border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;
  }
  .brand{
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin:0 0 2px;
  }
  h1{font-size:20px;margin:0 0 12px;font-weight:700;letter-spacing:-.01em;}
  .controls{display:flex;gap:8px;align-items:center;}
  .seg{
    display:flex;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:3px;flex:1;
  }
  .seg button{
    flex:1;border:0;background:transparent;color:var(--muted);
    font-size:14px;font-weight:600;padding:8px 6px;border-radius:8px;
    cursor:pointer;font-family:inherit;transition:.15s;
  }
  .seg button.active{background:var(--panel-2);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.3);}
  .fav-toggle{
    border:1px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:11px;padding:0 14px;height:42px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:.15s;
  }
  .fav-toggle.on{background:var(--accent-soft);border-color:var(--accent);color:#fff;}
  .fav-toggle .s{color:var(--star);}

  main{padding:8px 12px 40px;max-width:680px;margin:0 auto;}
  .slot-time{
    font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--muted);
    text-transform:uppercase;margin:22px 4px 8px;
  }
  .talk{
    display:flex;gap:10px;align-items:flex-start;
    background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:13px 12px;margin-bottom:8px;
    transition:border-color .15s;
  }
  .talk.fav{border-color:rgba(255,201,77,.55);}
  .talk-body{flex:1;min-width:0;}
  .talk-meta{display:flex;gap:8px;align-items:center;margin-bottom:4px;flex-wrap:wrap;}
  .room{
    font-size:11px;font-weight:700;color:var(--room);
    background:rgba(94,200,255,.12);border-radius:6px;padding:2px 7px;letter-spacing:.02em;
  }
  .room.expo{color:#c89bff;background:rgba(200,155,255,.12);}
  .title{
    display:block;color:var(--ink);text-decoration:none;
    font-size:15.5px;font-weight:650;letter-spacing:-.005em;
  }
  .talk.open .title{color:var(--accent);}
  .speaker{font-size:13px;color:var(--muted);margin-top:3px;}
  .star-btn{
    flex:none;width:40px;height:40px;border:0;background:transparent;cursor:pointer;
    font-size:23px;line-height:1;color:#3a4250;padding:0;display:flex;
    align-items:center;justify-content:center;transition:transform .12s,color .12s;
  }
  .star-btn.on{color:var(--star);}
  .star-btn:active{transform:scale(.82);}

  .talk-body{cursor:pointer;}
  .chev{
    display:inline-block;margin-left:6px;color:var(--muted);font-size:11px;
    transition:transform .2s;vertical-align:middle;
  }
  .talk.open .chev{transform:rotate(90deg);}
  .desc{
    max-height:0;overflow:hidden;
    transition:max-height .28s ease;
  }
  .talk.open .desc{max-height:1400px;}
  .desc-inner{padding-top:10px;margin-top:10px;border-top:1px solid var(--line);}
  .desc-inner p{font-size:13.5px;color:#c2ccd9;margin:0 0 10px;line-height:1.5;}
  .desc-inner ul{font-size:13.5px;color:#c2ccd9;margin:0 0 10px;padding-left:20px;line-height:1.5;}
  .desc-inner li{margin:0 0 3px;}
  .desc-inner .more{
    display:inline-block;font-size:12.5px;font-weight:600;color:var(--accent);
    text-decoration:none;
  }
  .desc-inner .none{font-size:13px;color:var(--muted);font-style:italic;margin:0 0 10px;}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:15px;}
  .empty span{display:block;font-size:34px;margin-bottom:12px;}
  footer{text-align:center;color:#566173;font-size:11px;padding:24px 16px;}
  footer a{color:#566173;}
</style>

<script>
const TALKS = [
  // ===== Wednesday 3 June =====
  {d:"wed",t:"09:00 – 10:00",room:"Expo",title:"Keynote: After the AI Hype – What’s Real, and What’s Next",sp:"Richard Campbell",id:"5cd4ea71df2e",url:"https://ndccopenhagen.com/agenda/after-the-ai-hype-what-s-real-and-what-s-next/5cd4ea71df2e",desc:"Artificial Intelligence dominates the headlines—and it’s clear we’re in the middle of a major hype cycle. But beneath the buzz, genuine innovations are delivering tangible value.\n\nSo what’s real, what’s exaggerated, and what’s next? Join Richard Campbell for an insightful look at the current AI surge, why it matters, and where the real success stories are happening today. Explore the opportunities, the challenges, and the eventual end of the hype cycle—so you can separate the promise from the noise and prepare for the future of AI in business and development."},

  {d:"wed",t:"10:20 – 11:20",room:"Room 1",title:"Let’s catch up with C#! Exciting new features in C# 9 to C# 14!",sp:"Filip Ekberg",id:"0cm2wdugq5d",url:"https://ndccopenhagen.com/agenda/lets-catch-up-with-c-exciting-new-features-in-c-9-to-c-14-0y9y/0cm2wdugq5d",desc:"With every iteration of C#, we get more and more features that are meant to make our lives as developer a lot easier.\n\nLet's explore what's new in C# 9, 10, 11, 12, 13 and 14!\n\nWe will look at how the language has changed and why these changes to the language will make us better C# developers, with less bugs in our code.\n\nWe will cover the following features:\n- Nullable reference types\n- Pattern Matching in C# 8 => C# 14\n- Init only & new()\n- Record types\n- Primary constructors\n- Collection expressions\n- Extension members\n\nWe'll also take a look at what's new in C# 14!"},
  {d:"wed",t:"10:20 – 11:20",room:"Room 2",title:"Five things every developer should know about building mission-critical systems",sp:"Loek Duys",id:"09w82qeuoyp",url:"https://ndccopenhagen.com/agenda/five-things-every-developer-should-know-about-building-mission-critical-systems-0p99/09w82qeuoyp",desc:"Mission-critical systems fail in surprising ways: networks have hick-ups, retries can double-book, and observability might lie.\n\nIn this session I will talk about real-world experiences learned from building software inside a utilities and banking landscapes.\nYou’ll see the patterns that matter, like multi-region design, idempotency and outbox/inbox, retry & circuit breaker, event-driven decoupling, and health monitoring. As a bonus, I will show tooling that helps you ship faster (Aspire, Dapr, CodeSpaces and more). I will make sure you will leave the room with knowledge you can apply next Monday."},
  {d:"wed",t:"10:20 – 11:20",room:"Room 3",title:"A Brief History of Data Storage",sp:"Eli Holderness",id:"0h8z1fn4vxg",url:"https://ndccopenhagen.com/agenda/a-brief-history-of-data-storage-07vp/0h8z1fn4vxg",desc:"For millennia, humans have known things. Pretty quickly, we started writing them down; our brains aren't particularly good at storing all the things we know reliably, and we needed something more durable.\n\nA long time ago, 'writing things down' looked like clay tablets with cuneiform on them, and affairs have only got more complicated from there. Nowadays, we try and write things down so that computers can understand them too, and that's given us a bewildering array of options - disk drives, magnetic tape storage and so much more.\n\nIn this talk, we're going to take a look at the history of writing things down, and discuss why some methods have worked better than others. We're going to talk about why writing things down for humans is different than doing it for a computer, and why it's difficult to try and do both at the same time (this is what code is). Finally, we'll take a look at what the state-of-the-art is today for keeping data safe, and what the future might hold.\n\nThis talk has no prerequisites, although a fondness for weird facts will certainly enhance the experience."},
  {d:"wed",t:"10:20 – 11:20",room:"Room 4",title:"AI Security in Practice: Protecting Your AI-Powered Applications",sp:"Olivia Liddell",id:"0s4fz3nlc46",url:"https://ndccopenhagen.com/agenda/ai-security-in-practice-protecting-your-ai-powered-applications-0cjo/0s4fz3nlc46",desc:"Everyone's excited about adding AI to their applications. But what about the security implications?\n\nAI introduces unique vulnerabilities that require new defensive approaches. This session shares practical strategies for securing AI applications in production, based on real-world implementation experience.\n\nYou'll learn:\n\n- New attack vectors that AI introduces: What makes AI security different from traditional application security\n- Securing AI at every layer: Input validation, model protection, output sanitization, and monitoring\n- When existing security tools fall short: Understanding the gaps in traditional defenses\n- Building security into your AI workflow: Practical controls for development, deployment, and operations\n\nWhether you're adding your first AI feature or scaling AI across your organization, you'll leave with actionable security practices for AI-powered systems."},
  {d:"wed",t:"10:20 – 11:20",room:"Room 5",title:"Beyond Pub/Sub - Advanced Messaging Patterns",sp:"Poornima Nayar",id:"0owyaep5ese",url:"https://ndccopenhagen.com/agenda/beyond-pubsub-advanced-messaging-patterns-0tpy/0owyaep5ese",desc:"Publish/subscribe is often the first pattern teams adopt when moving toward asynchronous, message-based architectures.\n\nIt’s a powerful way to decouple services and enable extensibility—but on its own, pub/sub doesn’t solve many of the problems that show up in real distributed systems, such as data loss, broken workflows, or systems that struggle under load.\n\nIn this session, we’ll go beyond basic pub/sub to explore a set of proven messaging patterns used in production. We’ll look at how the Outbox pattern prevents message loss during failures, how sagas coordinate long-running workflows without distributed transactions, and how competing consumers enable elastic throughput when demand spikes. Along the way, we’ll also examine essential operational safeguards such as retries, dead-letter queues, back pressure, and idempotency.\n\nBy the end of the talk, you’ll understand when and how to apply these patterns to build systems that are not just decoupled, but resilient, scalable, and designed to handle failure gracefully from day one."},

  {d:"wed",t:"11:40 – 12:40",room:"Room 1",title:"AI: It AI-n't What You Think!",sp:"Venkat Subramaniam",id:"0u8q5ov4poe",url:"https://ndccopenhagen.com/agenda/ai-it-ai-nt-what-you-think-0cq0/0u8q5ov4poe",desc:"Innovations have transformed human lives, in ways that we can't imagine how people survived before. Yet, we do not embrace innovations readily and we shouldn't in most cases. Our time in this world is juxtaposed with yet another major innovation in our field. Is AI going to take over the world, our jobs, our way of life...and more are questions that are asked frequently these days."},
  {d:"wed",t:"11:40 – 12:40",room:"Room 2",title:"Focus in a Fragmented World: A Developer’s Guide to Staying Productive",sp:"Susanne Bach Ladefoged Hou",id:"0j9yvcjzxaa",url:"https://ndccopenhagen.com/agenda/focus-in-a-fragmented-world-a-developers-guide-to-staying-productive-09gx/0j9yvcjzxaa",desc:"In today’s tech landscape, developers work in an environment built for constant interruption — notifications popping up all the time, priorities shifting before we’ve even finished our coffee, meetings multiplying like rabbits, and our devices doing everything they can to lure us away from actual work.\n\nFor many of us, staying productive isn’t just hard, it feels like trying to swim against a tidal wave while someone keeps throwing beach balls at your head.\n\nAs a software developer with ADHD, I’ve spent years experimenting with tools, habits, and workflows to keep myself focused — not in theory, but in the real world of deadlines, code reviews, teams messages, and the endless notifications we all get these days.\n\nThis talk breaks down the classic focus challenges developers face: spending too much time on our phones, struggling to start large tasks that suddenly feel enormous, procrastinating until stress takes over, losing track of what we were supposed to be doing, and drifting through meetings without absorbing a single word. Each section shares practical strategies I’ve personally tested — from structuring work sessions and managing dopamine distractions to locking my phone in a box and using productivity apps to manage my tasks.\n\nWhether you have ADHD or just feel overwhelmed by the chaos of modern work, you’ll walk away with practical tactics you can apply immediately to build clarity, momentum, and sustainable productivity in a fragmented world – not just at work, but in every aspect of life.\n\nIf you’ve ever opened 326587 tabs, stared at a half-written function, and wondered why you’re reorganizing your desk instead of coding… this talk is for you."},
  {d:"wed",t:"11:40 – 12:40",room:"Room 3",title:"From \"Trust Me\" to \"Verify Me\"",sp:"Tom van den Berg",id:"00arkbbzum3",url:"https://ndccopenhagen.com/agenda/from-trust-me-to-verify-me-0o0j/00arkbbzum3",desc:"Modern software supply chain attacks don’t start in your code, they start in your build pipeline.\n\nEven with linters, tests, and security scans in place, you can still ship or deploy compromised software if you can’t prove what was built, how it was built, and that it hasn’t been tampered with.\n\nIn this session, we’ll explore how provenance and attestation turn “trust me” into verifiable evidence. Using the SLSA framework as a foundation, you’ll see how producers can generate cryptographically signed build provenance using GitHub Actions and how consumers can verify artifacts before they are allowed into production.\n\nBeyond tooling, we’ll look at how verification fits into real CI/CD workflows, how to enforce trust as a deployment gate, and how to make software supply chain security an actionable, enforceable practice.\n\nLive demos will show practical steps you can apply immediately in your own pipelines."},
  {d:"wed",t:"11:40 – 12:40",room:"Room 4",title:"Tour of Agent Protocols: MCP, A2A, AG-UI, A2UI",sp:"Mete Atamel",id:"0cw3wf4navp",url:"https://ndccopenhagen.com/agenda/tour-of-agent-protocols-mcp-a2a-ag-ui-a2ui/0cw3wf4navp",desc:"There are many emerging protocols around agents. Model Context Protocol (MCP) standardizes how models and agents access external tools and resources. Agent2Agent Protocol (A2A) defines how agents running on diverse frameworks and platforms communicate.\n\nAgent to User Interface Protocol (A2UI) defines how agents generate UI and Agent-User Interaction Protocol (AG-UI) defines how agents communicate with frontends.\n\nIn this session, we’ll deep-dive into each protocol and show how they complement each other. As a bonus, we’ll also see demos on how to use these protocols in agent frameworks such as Agent Development Kit (ADK) to give you practical knowledge to start building your own interoperable agents."},
  {d:"wed",t:"11:40 – 12:40",room:"Room 5",title:"Global Bias in AI: When Western Data Shapes the World",sp:"Masuma Shariff",id:"0lytrp45thm",url:"https://ndccopenhagen.com/agenda/global-bias-in-ai-when-western-data-shapes-the-world-0eff/0lytrp45thm",desc:"AI systems are only as good as the data they learn from, but what happens when that data overwhelmingly comes from Western nations?\n\nThis talk explores the systemic bias in AI models caused by uneven global data representation, and how it impacts developing nations in areas like healthcare, finance, and governance. We’ll examine real-world consequences of this imbalance, discuss why diversity in datasets matters for security and fairness, and propose strategies for building inclusive AI that serves the entire world, not just the Global North."},

  {d:"wed",t:"13:40 – 14:40",room:"Room 1",title:"10 tips to level up your AI-assisted coding",sp:"Aleksander Stensby",id:"9dd8396251a9",url:"https://ndccopenhagen.com/agenda/10-tips-to-level-up-your-ai-assisted-coding/9dd8396251a9",desc:"AI coding assistants are rapidly reshaping how developers write, debug, and ship software. Tools like Cursor and Claude Code can supercharge productivity — but only if you know how to use them effectively.\n\nIn this session, we’ll cut through the hype and focus on practical, developer-tested strategies for getting the most out of AI in your workflow.\n\nYou’ll learn how to master prompting and context engineering, make the most of long context windows, streamline debugging and testing, and integrate AI into your daily development practices without sacrificing code quality or security. We’ll also explore how emerging standards like Model Context Protocol (MCP) unlock new workflows by connecting your AI assistant directly to tools such as GitHub, Slack, Playwright or Figma — turning it from a code generator into a true development teammate.\n\nWhether you’re new to AI-assisted coding or already experimenting with it daily, you’ll leave this talk with concrete ideas and techniques you can apply immediately to level up your development process."},
  {d:"wed",t:"13:40 – 14:40",room:"Room 2",title:"Test Driving Code with the Help of AI",sp:"Venkat Subramaniam",id:"0mlwfpz69vr",url:"https://ndccopenhagen.com/agenda/test-driving-code-with-the-help-of-ai-0de8/0mlwfpz69vr",desc:"We all know the benefits of TDD but we often find it time consuming and tedious to write. What if AI can do the driving and we can be the shrewd navigator?\n\nIt's easily said than done, but once we learn the right techniques the result can be rewarding. In this presentation we will take an example driven approach to test drive a piece of code and see how we can be that navigator that can steer us towards reaping the benefits of TDD."},
  {d:"wed",t:"13:40 – 14:40",room:"Room 3",title:"Everything a .NET developer needs to know about configuration and secret management",sp:"Sander ten Brinke",id:"0mcfn3rsyld",url:"https://ndccopenhagen.com/agenda/everything-a-net-developer-needs-to-know-about-configuration-and-secret-management-0alt/0mcfn3rsyld",desc:"App configuration. Settings. Secrets. We have all dealt with these things in our code without thinking much about it.\n\nBut how does this actually work in .NET and how do you make the most of it? And more importantly, how do you store them correctly and prevent leaking secrets?\n\nThis talk will teach you how configuration works in .NET, what you should and shouldn't do, and how you can use the power of the cloud to keep your secrets safe!\n\nThe following topics will be discussed (including demo's):\n\n- The importance of configuration and secret management\n- The basics of .NET's configuration system and how it is set up under the hood\n- The Options pattern and how it improves the configuration system\n- Secret management during local development\n- Best practices for an enjoyable configuration experience\n- Secret management in the cloud using Azure Key Vault and Managed Identities.\n- Tips and tricks and extra resources\n\nWhen there's time left over, we will also cover Azure App Configuration and how it can make .NET configuration more powerful and manageable."},
  {d:"wed",t:"13:40 – 14:40",room:"Room 4",title:"How I helped developers talk about feelings and needs",sp:"Gitte Klitgaard",id:"0a72lg2a93u",url:"https://ndccopenhagen.com/agenda/how-i-helped-developers-talk-about-feelings-and-needs-0z50/0a72lg2a93u",desc:"As humans we are not good at sharing our feelings and needs, and it seems to be even harder for people in tech.\n\nMany conflicts and misunderstandings happen because team members don't know what the other members needs. When we don't that, we may accidentally hurt them.\n\nI helped many teams over the years and I have seen this happen again and again. Over time I have developed techniques to address this part as well.\n\nI was working in a large media company, when a team had a conflict escalate into an emotional situation. This is the story of how I helped them talk about their feelings and needs, which was the first step in collaborating again.\n\nI will also share some techniques that you can try out with your own team."},
  {d:"wed",t:"13:40 – 14:40",room:"Room 5",title:"Lightning Talks 1",sp:"Theodor René Carlsen, Kristoffer Nordström",id:"0he5mnt1kdo",url:"https://ndccopenhagen.com/agenda/lightning-talks-1-0raw/0he5mnt1kdo",desc:"Lightning talks (approx 10-15 minutes each)\n\nTalk 1: The fundamentals of Agentic Coding (AKA Vibe Coding) - Theodor René Carlsen\nAI, whether we like it or not, has fundamentally changed the ways we work with code. In the beginning, many swapped out Stack Overflow for ChatGPT, moved from editing code to autocompleting with tools like Copilot, but now we are seeing more tools that that can write large parts of the solution for you.\n\nMost people will relate to the feeling that “vibe coding” or “agentic coding” is a moving target, where both the models and the tools evolve at near-exponential speed. In this talk, I aim to reduce the sense of FOMO many might get when they hear people using these tools to write and refactor large parts of their codebase for them. Whether that FOMO comes from LinkedIn, X or your boss thats fully convinced that vibe coding is the future, we will try to stay grounded when meeting this new technology.\n\nWe will cover the basics so that you can actually understand what these tools are about: what they can and what they cannot do, what is mostly hype and what is actually worth checking out. And yes, we will also try to define the term \"agentic coding\" .\n\nTalk 2: The Design Systems Graveyard - Kristoffer Nordström\nIt is said you can't succeed in building a Design System without having done so before. But building a Design System is easy - maintaining and making it grow is much more difficult. During the years many Design Systems have failed and ended up on the Design Systems Graveyard. I will share some trips and tricks that will make it less likely that you fail in your attempt of succeeding with one. Join me on a story about planning, categorising and sorting and about handling human beings and collaboration. This also have something in common with The Gentle Art of Swedish Death Cleaning. If you fail maybe your Design System will end up on The Design Systems Graveyard."},

  {d:"wed",t:"15:00 – 16:00",room:"Room 1",title:"Building Better Components - A Journey to a More Resilient Frontend",sp:"Daniel Yuschick",id:"06o112nk13x",url:"https://ndccopenhagen.com/agenda/building-better-components-a-journey-to-a-more-resilient-frontend-0a4h/06o112nk13x",desc:"Components are at the core of modern development. However, for as much as they can help empower our work, they can harm and hinder it.\n\nContent will forever and always change, so building resilient components requires careful planning and collaboration. And, of course, requires avoiding the common pitfalls of component design.\n\nWe will learn from the experience of working within and leading the development of multiple design systems built around React and TypeScript. Through many code samples, we'll highlight common patterns that lead to unmanageable component interfaces with steep learning curves. We'll learn how deviating from HTML can cause our components to break down, littering our codebase with technical debt. But with these examples, we'll learn how to avoid the common pitfalls of component design, and how to not only build frontends that are resilient to change, but how to build trust across teams throughout an entire product."},
  {d:"wed",t:"15:00 – 16:00",room:"Room 2",title:"Dangerous Reactivity: Why AI Output Is the New XSS",sp:"Ramona Schwering",id:"0evtg3zx9ak",url:"https://ndccopenhagen.com/agenda/dangerous-reactivity-why-ai-output-is-the-new-xss-0f7x/0evtg3zx9ak",desc:"Vue developers know one golden rule: never use v-html on user input.This or something similar is well-known in other frameworks, too. Yet, as we're integrating Large Language Models (LLMs) into our applications, we often make a fatal mistake. We're treating AI output as a trusted source. This is fine, right? Well, not automatically....\n\nLet’s look at OWASP LLM05 and how \"Improper Output Handling\" impacts the security of Vue components. Therfore, let's discuss examples where safe inputs can trick models, causing vulnerabilities like XSS and injection attacks. By the end, you’ll learn how to be \"professionally pessimistic\" for AI. You’ll learn how to sanitize LLM data, safely render Markdown, and manage AI-generated content. Join my session to approach technology with caution, I look forward to exploring this with you!"},
  {d:"wed",t:"15:00 – 16:00",room:"Room 3",title:"Designing REST APIs for the age of AI agents",sp:"Boyan Mihaylov",id:"0rghm3y3au6",url:"https://ndccopenhagen.com/agenda/designing-rest-apis-for-the-age-of-ai-agents-0fcs/0rghm3y3au6",desc:"REST APIs were designed for human developers - but nowadays many consumers are AI agents. LLMs generate requests, interpret responses, and chain APIs together autonomously. What does that mean for your API design?\n\nThis talk explores how to make your REST APIs understandable, reliable, and useful not only to humans, but also to machines that \"learn\" from documentation and responses.\n\nYou will see how to structure endpoints for discoverability, add metadata that helps AI reason about your API, and protect your systems from unpredictable agent behavior. We will explore topics like security, error-handling, hypermedia-driven APIs, and monitoring for reliability at scale. By the end, you will understand how to make your APIs ready for an AI-driven world - where your next client might not be a person."},
  {d:"wed",t:"15:00 – 16:00",room:"Room 4",title:"Evolving AI chat with MCP Apps",sp:"Phil Nash",id:"0gh3vdfrj4c",url:"https://ndccopenhagen.com/agenda/evolving-ai-chat-with-mcp-apps-0npf/0gh3vdfrj4c",desc:"Interacting with AI is still mostly text: you type, it calls tools and generates responses. But text is the wrong UI for many tasks and leads to awkward experiences. We've been building great experiences on the web for years, so let's bring that into chat.\n\nThe MCP Apps extension is a proposed standard, inspired by MCP-UI and OpenAI's Apps SDK, that adds a UI layer to MCP that agents can render, generating real, web-powered interfaces that users can control from inside the chat.\n\nIn this talk you'll learn how to build interactive UIs that run inside AI chats. We'll start with a standard MCP server, add a UI component to display results, then make it interactive. We'll see the experience evolve from plain text to a mini-app inside the chat that can call tools and carry on the conversation. You'll leave ready to bring your app to life inside AI chats."},
  {d:"wed",t:"15:00 – 16:00",room:"Room 5",title:"It's like 10,000 streams when what you need is a queue",sp:"Chris Simon",id:"0oc5wuf1cis",url:"https://ndccopenhagen.com/agenda/its-like-10000-streams-when-what-you-need-is-a-queue-0gvj/0oc5wuf1cis",desc:"🎶🎵 A new dev team adopted E-D-A\nGot head of line blocking, on their very first day\nIsn't it ironic, don't you think 🎶🎵\n\nThe last few years have seen widespread adoption of Event-Driven Architecture, supported by DDD practices such as event storming. But what does that orange sticky note become when we start implementing our design? Common implementation choices include event sourcing, streaming platforms like Kafka and queuing systems like RabbitMQ.\n\nUnfortunately not every orange sticky note has the same operational needs, and many teams remain confused about the differences between these options, resulting in the selection of the wrong paradigm for their needs.\n\nThis can lead to unnecessary complexity & operational challenges such as head of line blocking, dropped messages, challenges dealing with failed messages, difficulty with adaptive scaling and inadvertently increasing coupling between services.\n\nIn this talk we'll bring that orange sticky note into the runtime of our system. We’ll start with a deep dive into the similarities and differences between event streaming platforms such as Kafka and queueing systems such as RabbitMq, Azure Service Bus & AWS SNS/SQS.\n\nWe’ll then look at ways to assess your orange sticky notes to work out which messaging and persistence paradigms suit each one, helping you build more resilient, scalable and loosely coupled event-driven architectures."},

  {d:"wed",t:"16:20 – 17:20",room:"Room 1",title:"The Sound of Your Secrets: Teaching Your Model to Spy, So You Can Learn to Defend",sp:"David vonThenen",id:"0c5e130d9d9a",url:"https://ndccopenhagen.com/agenda/the-sound-of-your-secrets-teaching-your-model-to-spy-so-you-can-learn-to-defend-0bdr/0c5e130d9d9a",desc:"Every keyboard has a sound signature. Every click and clack carries information. With deep learning and a decent microphone, that information can be weaponized.\n\nIn this session, we'll explore how modern AI models can identify what you're typing just from the sound of your keyboard. Using a dataset of recorded keystrokes and an open source sound classification pipeline, we'll walk through building a model that can recover text with startling accuracy. You'll see firsthand how a few lines of Python and a trained network can turn your laptop into an acoustic fingerprint.\n\nBut this talk isn't about enabling surveillance... it's about understanding it to fight back. We'll unpack why uniform keyboard layouts and consistent typing styles make these attacks so effective, then explore real countermeasures: signal masking, password entropy, and environmental noise defenses. You'll leave with a practical understanding of how these attacks work, how to reproduce them for research or awareness, and how to harden your systems (and yourself) against them."},
  {d:"wed",t:"16:20 – 17:20",room:"Room 2",title:"Building fun and creative messaging experiences on WhatsApp",sp:"Michelle \"MishManners\" Duke",id:"08m6dwxi84v",url:"https://ndccopenhagen.com/agenda/building-fun-and-creative-messaging-experiences-on-whatsapp-0db8/08m6dwxi84v",desc:"In this talk, I’ll show how to turn a simple WhatsApp message into an AI-powered creative experience.\n\nUsing Twilio, WhatsApp, and OpenAI’s image generation APIs, we’ll build a workflow where users can send images via WhatsApp; think selfies, pet pics, and photos from the conference, and receive a cartoon, sketch, or fun version of your photo to share on your socials, group chats, and company message boards.\n\nIn this talk we'll cover:\n- Why should we consider creating fun and engaging experiences via messaging\n- How OpenAI's API works\n- How to set up Twilio’s WhatsApp sandbox to send and receive incoming media\n- How to process and transform images with OpenAI’s latest APIs\n- Utilising existing libraries to transform images\n- Sending images through WhatsApp\n- Best practices for handling image input, latency, and user experience\n- Other cool things you can build once you have images\n\nThis demo is practical, fun, and showcases how teams can blend communication APIs with AI to create delightful, interactive messaging experiences."},
  {d:"wed",t:"16:20 – 17:20",room:"Room 3",title:"Imagine If We Made It Simple",sp:"Gui Ferreira",id:"0z1711btwam",url:"https://ndccopenhagen.com/agenda/imagine-if-we-made-it-simple-0eq0/0z1711btwam",desc:"When was the last time you paused at work and thought: \"How did this get so complicated?\"\n\nWe never planned to make our jobs harder. But somewhere between chasing new tools, planning for problems that may never come, jumping on every trend and trying to prepare for every future scenario, we lost our way. Today, building software isn't just complex. It's exhausting.\nThe worst part? We did this to ourselves. Our habits, our pride, and our fear of missing out push us to add more and more, even when less would serve us better.\n\nBut what if we chose another path? What if we stopped and asked: \"How simple can this be?\" Not simple as in easy or limited, but simple as in clear, focused, and built to last.\n\nThis session isn't about magic fixes or secret frameworks. It's about seeing that simplicity is both a choice and an opportunity. It takes discipline, creativity, courage, and sometimes more work than the complex path.\nWe'll explore why we tend to overcomplicate things and how to practice simplicity through Focus on what truly matters, Subtract what doesn't, and Master what remains.\n\nThe next big shift in software won't come from AI or the next shiny tool.\nIt will come from how we use them, and it starts with the next decision you make."},
  {d:"wed",t:"16:20 – 17:20",room:"Room 4",title:"Inside Today’s AI-Accelerated Software Supply Chain Attacks",sp:"Mackenzie Jackson",id:"0rvbvqum2vt",url:"https://ndccopenhagen.com/agenda/inside-todays-ai-accelerated-software-supply-chain-attacks-0rcu/0rvbvqum2vt",desc:"In 2026, software supply chain attacks grew dramatically in scale and sophistication.\n\nThe Aikido Security research team was the first to uncover several of the most impactful incidents, including the Shai-Hulud self-propagating worm, the largest mass compromise of npm packages involving debug and chalk, and the backdooring of an official XRP cryptocurrency SDK. Together, these discoveries revealed that supply chain attacks are no longer isolated events, but carefully engineered campaigns designed to scale.\n\nAttackers are also increasingly leveraging artificial intelligence as part of this evolution. We’ve seen early signs of this in real-world incidents, including prompt injection attacks delivered through CI/CD pipelines, impacting multiple Fortune 500 companies. including Google.\n\nThis talk breaks down why attackers increasingly target the software supply chain and what makes it such a powerful leverage point. We’ll examine the anatomy of modern supply chain attacks, including how attackers gain initial access to trusted packages, workflows, and extension ecosystems; how they move laterally by harvesting tokens and abusing CI/CD systems; and what their ultimate objectives are. We’ll also explore why certain ecosystems, such as package registries and IDE extensions, are especially vulnerable, why detecting malicious behavior remains so difficult, and what practical steps organizations and the broader community can take to raise the bar against these threats."},
  {d:"wed",t:"16:20 – 17:20",room:"Room 5",title:"Machines, Learning, and Machine Learning",sp:"Dylan Beattie",id:"3570726443e8",url:"https://ndccopenhagen.com/agenda/machines-learning-and-machine-learning/3570726443e8",desc:"It wasn't all that long ago that \"learn to code\" was failsafe career advice, and whether you were studying for a university degree, enrolling in a coding bootcamp or just hacking on open source, the prospect of a well-paid job at the end of it was all the motivation you needed... well, times change. Whether you're looking for your first tech job or your next consulting contract, it's tough out there, and naturally, people are asking \"what should I be learning next?\"\n\nWhat if that's the wrong question? What if the real question isn't what you learn, but how you learn it - and how to get started? Let's talk about motivation. Let's talk about all the wonderful tools and systems out there that make it easier than it's ever been to start exploring new languages and platforms, from Copilot and ChatGPT, to cloud IDEs and IOT microcontrollers. Let's talk about the all-important difference between programs and products; about the challenges of going from \"hey, it works on my machine\" to something customers will actually pay for. We’ll find out why open source projects succeed where well-funded corporate projects fail, why are there so many JavaScript frameworks – and why you’re still sitting up writing code at 3am, even though you know you have work in the morning."},

  {d:"wed",t:"17:40 – 18:40",room:"Room 1",title:"The AI puppet dance",sp:"Einar Høst",id:"0xbpuhkpzqu",url:"https://ndccopenhagen.com/agenda/the-ai-puppet-dance-01w8/0xbpuhkpzqu",desc:"The AI hype wave is washing over us, fueled by advances in generative AI tools. It's a mixture of grandiose claims, speculations, euphoria and panic.\n\nEveryone wants to demonstrate that they are on board the AI train choo-chooing towards the future, that they're not getting left behind. The rhetoric will have us act, not think - there is no time! Is that true? It's a paradox that we are supposed to meet artificial intelligence with our own intelligence turned off. If it's true that AI will \"change everything\", surely we need every ounce of human intelligence - as well as compassion, wisdom and humanity - we can muster! And what if it turns out to be false? At what cost do we participate in this dance?"},
  {d:"wed",t:"17:40 – 18:40",room:"Room 2",title:"Web APIs You Should Be Using in 2026: Unlocking Next-Level Web Experiences",sp:"Nhlanhla Lucky Nkosi",id:"0akpt4if3ek",url:"https://ndccopenhagen.com/agenda/web-apis-you-should-be-using-in-2026-unlocking-next-level-web-experiences-077m/0akpt4if3ek",desc:"The web is evolving, and so are the APIs that power it. This talk dives into the newest and most underutilised browser APIs, including the File System Access API, Background Fetch API, WebGPU, Web Share API Level 2, and Contacts Picker API.\n\nAttendees will learn how these tools can simplify development, enhance user experience, and bring desktop-like capabilities to the web. Through live demos and practical examples, developers will leave with actionable insights and inspiration to integrate these APIs into their own projects.\n\nThis talk is targeted at web developers, technical leads, and product designers eager to explore innovative browser capabilities and stay ahead of the curve."},
  {d:"wed",t:"17:40 – 18:40",room:"Room 3",title:"How Anthropic uses Claude Code: Agentic Software Engineering at Scale",sp:"Daisy Hollman",id:"70b42b46dcd5",url:"https://ndccopenhagen.com/agenda/how-anthropic-uses-claude-code-agentic-software-engineering-at-scale/70b42b46dcd5",desc:"Over the past year, the capabilities of coding agents have expanded massively, and software engineers are demanding more of them than ever. But context window sizes have pretty much stagnated—one million tokens was roughly the state of the art a year ago, and it remains so today. As we move towards a world where agents regularly tackle monorepo-scale tasks, the demand to squeeze more and more information into those fixed limits of model context has grown into a real, full-time engineering task.\n\nIn this talk, I'll walk through the design of Claude Code plugins and their constituent context engineering primitives. For each one, we'll ask the crucial question for software engineering in 2026: does it scale? We'll talk about how we're answering this question for our own code at Anthropic—both in terms of what's working and what isn't."},
  {d:"wed",t:"17:40 – 18:40",room:"Room 4",title:"Above the Cloud: Building Data Centers in Space",sp:"Richard Campbell",id:"0bl5e010dzy",url:"https://ndccopenhagen.com/agenda/above-the-cloud-building-data-centers-in-space-0xak/0bl5e010dzy",desc:"The demand for AI data centers has reached a fever pitch - stressing the power grid and people's nerves. Does putting those data centers in space make any sense?\n\nJoin Richard Campbell as he explores the challenges and potential of putting data centers into orbit. The balance of cost, performance, latency, power, cooling, and reliability makes for a difficult mix - but the potential for the future is significant!"},
  {d:"wed",t:"17:40 – 18:40",room:"Room 5",title:"How I Tamed Claude",sp:"Emmz Rendle",id:"07tnc0mz5eh",url:"https://ndccopenhagen.com/agenda/how-i-tamed-claude-0x5t/07tnc0mz5eh",desc:"I'm the CTO of a very small, very hi-tech company, which means I'm working on multiple things simultaneously.\n\nTo do this, I've developed a process for working with coding agents, particularly Claude Code, which allows me to switch context rapidly and do things I don't 100% know how to do myself.\n\nIn this talk I'll share the techniques I've learned, developed and refined that help me get solid, usable code that I can put into production with confidence. I'll show you how to write a detailed requirements document that an agent can work from; how to work through those requirements step by step in collaboration with your LLM; how to maintain state between sessions (which is helpful for me as well as Claude); and how to keep up with what it's doing so you can take responsibility for the solution long after its context window has closed forever.\n\nI'll also share some thoughts about where junior developers fit into this new way of working, and how important it is that humans continue to be the primary agents in software engineering."},

  {d:"wed",t:"18:40 – 22:00",room:"Expo",title:"NDC Party",sp:"The Linebreakers · Anders Norås",id:"0788f80b0963",url:"https://ndccopenhagen.com/agenda/ndc-party-cph/0788f80b0963",desc:"Kick back, get to know your fellow attendees and speakers. The party is complimentary for all NDC delegates.\n\nParty Schedule\n\n18:40 - 19:40 - Conference Reception - Food & Drinks in the Expo\n19:40 - 20:40 - Dream Machines and Walled Gardens - Anders Norås\n20:40 - 22:00 - The NDC Party Jam ft. the Linebreakers\nJoin Dylan Beattie, the Linebreakers and special guests for a live music party show featuring classic rock hits from across the decades, singalong anthems and party bangers."},

  // ===== Thursday 4 June =====
  {d:"thu",t:"09:00 – 10:00",room:"Room 1",title:"Functional Programming Made Simple",sp:"Simon Painter",id:"0fm7w6o672e",url:"https://ndccopenhagen.com/agenda/functional-programming-made-simple-0d5b/0fm7w6o672e",desc:"Functional Programming is one of the most incredible & powerful techniques a developer in any programming language can posess. It gives you a codebase that's more stable, better structured, easier to maintain and test, and better for understanding what your code actually does,\n\nBut - It has a tragically unfair reputation for being hard to understand. It really isn't, but when folks throw around quotes like \"A monad is just a monoid in the category of endofunctors\" it can seem impossible.\n\nIn this talk, I'm going to look at the hisory of FP - where it came from, who invented it and why?\n\nI'm going to break down all of this strange-looking terminology and explain - in simple terms - what it all actually means, any why it's useful.\n\nYou'll leave not only knowing what a Monad is, but why you need to start using them today!"},
  {d:"thu",t:"09:00 – 10:00",room:"Room 2",title:"Completing the Rewrite from Hell: Five Years of Technical Debt and How We Escaped",sp:"Aaron Stannard",id:"0ud77xngdcg",url:"https://ndccopenhagen.com/agenda/completing-the-rewrite-from-hell-five-years-of-technical-debt-and-how-we-escaped-0zw8/0ud77xngdcg",desc:"Bad architecture decisions don't just slow you down - they destroy business value. Poor coupling means you can't add the features customers are asking for.\n\nData model mistakes mean you don't have the information to answer your questions, and a lot of your decisions can't be easily reversed. You know the problems are there. You've known for years. But there's never time to fix it properly - you're too busy keeping the lights on.\n\nThen one day, the stars align. You finally have time to tackle it. You open the codebase, ready to make things right - and realize you have no idea where to start. Everything is wrong. Every fix breaks something else. The whole thing feels impossible.\n\nI'm a business owner. I had full authority to prioritize this rewrite. No one to convince, no budget to fight for. I still couldn't make it happen for five years - even while watching money walk out the door.\n\nThis is the story of how we finally completed that rewrite. You'll learn:\n\n- Why we abandoned a full rewrite and pivoted to strategic refactoring instead\n- How to assess whether your legacy system is salvageable (ours barely was)\n- The architectural patterns - including the actor model - that would have prevented this mess\n- How we used AI to accelerate the work (spoiler: it wasn't vibe coding)\n- The management failures that let this happen, and how to avoid them\n\nThis isn't a talk about how smart we are. It's about how we recovered from one of my biggest failures as an engineering leader - and what you can learn from our five-year journey through hell."},
  {d:"thu",t:"09:00 – 10:00",room:"Room 3",title:".NET Testing Techniques You Didn’t Know You Needed",sp:"Dante De Ruwe",id:"0p6kmhm25pe",url:"https://ndccopenhagen.com/agenda/net-testing-techniques-you-didnt-know-you-needed-0il0/0p6kmhm25pe",desc:"Testing is hard. Testing the right things in the right way is even harder. In this talk, I’ll show techniques that will help you write better, more productive tests.\n\nWe’ll explore mutation testing, which checks whether your tests actually catch bugs instead of just always passing. Property-based testing lets your code generate hundreds of input variations automatically, exposing edge cases you wouldn’t have thought of. And for complex data structures or legacy code, snapshot testing can capture outputs and catches unexpected changes over time.\n\nAlong the way, I’ll hint at other practical approaches that can level up your testing. You’ll leave with concrete ideas to write fewer, but far more effective tests."},
  {d:"thu",t:"09:00 – 10:00",room:"Room 4",title:"How to Lie with AI: Understanding Bias, Ethics, and the Hidden Risks in Machine Learning",sp:"Clarissa Rodrigues",id:"0iuah5m87sv",url:"https://ndccopenhagen.com/agenda/how-to-lie-with-ai-understanding-bias-ethics-and-the-hidden-risks-in-machine-learning-0q0z/0iuah5m87sv",desc:"Do you understand AI well enough to spot a lie?\n\nI will dive into the fascinating world of artificial intelligence and machine learning, focusing on how bias can infiltrate AI models. Attendees will explore real-world examples of biased AI decisions, learn how machine learning models can \"lie,\" and discuss the ethical challenges this poses. Through case studies like COMPAS and image classification failures, we’ll uncover how biased data can lead to problematic outputs. By the end of the session, attendees will gain practical strategies to identify, prevent, and mitigate AI bias in their own work.\nTakeaways:\nUnderstanding AI and Bias through real-life case studies\nEthical Concerns and Practical solutions\nFuture of looking ahead"},
  {d:"thu",t:"09:00 – 10:00",room:"Room 5",title:".NET supply chain: Protecting against hidden threats",sp:"Tom van den Berg",id:"0sdd2jc8jas",url:"https://ndccopenhagen.com/agenda/net-supply-chain-protecting-against-hidden-threats-0fnx/0sdd2jc8jas",desc:"Modern software relies heavily on third-party components like open-source libraries and NuGet packages, which can introduce security risks.\n\nIf you're not carefully managing these dependencies, you could expose your application to vulnerabilities or even malicious code, just like what happened with Log4J.\n\nIn this session, we'll cover best practices for securing your .NET projects, including using tools like Trivy and NuGet’s security features to scan and monitor dependencies. We’ll also discuss supply chain observability, how to track vulnerabilities and ensure the integrity of your components.\n\nBeyond tools, we'll touch on team policies for approving third-party libraries, setting security gates in CI/CD pipelines, and fostering a security-first mindset in your organization. Live demos will show practical steps you can implement right away to protect your applications."},

  {d:"thu",t:"10:20 – 11:20",room:"Room 1",title:"Let's break some WCAG rules",sp:"Elise Kristiansen",id:"02974n41189",url:"https://ndccopenhagen.com/agenda/lets-break-some-wcag-rules-0m29/02974n41189",desc:"Let's experience a web that's not made for you!\n\nThis talk is not a checklist of rules. It’s an interactive wake-up call.\n15–25% of the population needs websites to accommodate different types of disabilities. Still, 94.8% of websites contain accessibility issues that make them harder to use.\n\nIt’s not because we don’t want to develop accessible websites and applications.\nBut we often lack knowledge and perspective. We build based on our own experience because that’s what we know. In this talk, you’ll get to experience how our applications work for someone with a screen reader, low vision, or limited motor control, and feel firsthand the challenges they face.\n\nThe talk combines knowledge, practice, and lived experience to raise your awareness of accessibility on the web and how small changes can make a huge difference.\n\nYou'll see the most common mistakes in action, who they affect, and how to fix them. So come experience the world through someone else's senses, and learn how to be a more accessible developer."},
  {d:"thu",t:"10:20 – 11:20",room:"Room 2",title:"Let's build an AI agent",sp:"Phil Nash",id:"08wewbsp43s",url:"https://ndccopenhagen.com/agenda/lets-build-an-ai-agent-0j0g/08wewbsp43s",desc:"To understand the world of agents, we must get inside them and see how they work from the inside out.\n\nYou'll see how large language models, functions, and open source tools fit together to bring to life an agent over the course of the talk. We'll build out an agent that starts simple and graduates to a multi-agent model, with different components managing and performing tasks.\n\nYou'll leave with a good idea of what you need to know to start building your own powerful agents."},
  {d:"thu",t:"10:20 – 11:20",room:"Room 3",title:"Optimizing your HttpClient usage",sp:"Nico Vermeir",id:"01gguyo4wg4",url:"https://ndccopenhagen.com/agenda/optimizing-your-httpclient-usage-09m9/01gguyo4wg4",desc:"HttpClient is a core class in .NET that developers frequently use, either directly or through proxy libraries. However, do you truly understand the full extent of this powerful tool? Did you know that different types of clients have distinct best practices when it comes to making HTTP calls?\n\nIn this deep-dive session, we will explore the best practices, advanced scenarios, and performance optimization techniques to ensure you get the most out of HttpClient in your applications. Beyond HttpClient, we will also discuss libraries that extend its capabilities, such as implementing the circuit breaker pattern.\n\nBy the end of this session, you will gain a comprehensive understanding of how HTTP calls work within .NET and how to achieve optimal performance in your applications."},
  {d:"thu",t:"10:20 – 11:20",room:"Room 4",title:"Most Expensive Design Mistakes (Ever) and how to avoid them",sp:"Clarissa Rodrigues",id:"04zutouiuzf",url:"https://ndccopenhagen.com/agenda/most-expensive-design-mistakes-ever-and-how-to-avoid-them-07iq/04zutouiuzf",desc:"As work to make sure goods and services are designed, Description: developed, and made to meet or exceed consumers’ expectations and requirements. But, isn’t UX doing the same?\n\nHaving the users in mind is what connects these areas to build better products.\nA fantastic User Experience is what makes the difference when customers choose between one product or another. Considering that, it only makes sense that QAs and UXrs join forces and help build great experiences from their own perspectives. Why not have a system that considers the best of both worlds?\nAs you’d know, the saying that “good design is obvious” is a tale as old as time. As Steve Krug once said, “Your goal should be for each page or screen to be self-evident, so that just by looking at it the average user can say “I get it.” - Steve Krug.\nTakeaways:\nHow to create effective visual hierarchies\nHow to don’t reinvent the wheel\nHow to nor we allow personal feelings to take over the process and how ask the right questions"},
  {d:"thu",t:"10:20 – 11:20",room:"Room 5",title:"Application Performance Optimisation in Practice",sp:"Steve Gordon",id:"0z5j9lwjqky",url:"https://ndccopenhagen.com/agenda/application-performance-optimisation-in-practice/0z5j9lwjqky",desc:"Application performance always matters. Sometimes critically, sometimes subtly, but it’s never irrelevant. While many developers rightly caution that “premature optimisation is the root of all evil,” the opposite mistake, ignoring performance until it becomes a serious issue, can be just as problematic.\n\nThis talk explores the practical aspects of performance optimisation in .NET. We’ll look at proven strategies for monitoring, identifying, analysing, and iteratively improving applications. You’ll learn how to approach the performance lifecycle, from monitoring applications in production and pinpointing the best areas to optimise, to investing valuable engineering time where it counts most.\n\nThrough a worked example, we’ll follow a feature through the optimisation cycle. We’ll profile the application, design benchmarks, theorise improvements, and iteratively refine the implementation to reduce allocations and execution time, while balancing performance gains with code readability and maintainability.\n\nAlong the way, you’ll learn how to use tools like dotTrace, dotMemory, and BenchmarkDotNet to target areas for improvement and validate gains. We’ll discuss common optimisation opportunities, from smarter memory usage and fewer allocations to more efficient execution flow.\n\nBy the end of this session, you’ll leave with practical techniques to write faster, more efficient .NET code, along with the judgment to know when optimisation is worth the trade-off, and when it’s not."},

  {d:"thu",t:"11:40 – 12:40",room:"Room 1",title:"Is Spec Kit the future for software development",sp:"Johan Smarius",id:"0tlp6xrtrjc",url:"https://ndccopenhagen.com/agenda/is-spec-kit-the-future-for-software-development-0te7/0tlp6xrtrjc",desc:"Using AI for code generation is getting quite common. Finding the right prompts to get the code well-written can be challenging, and this approach focuses a lot on the technical part of software development.\n\nBut what if you could focus more on specifying the user requirements rather than the technical implementation? Well, meet GitHub Spec Kit. This is an experimental specification-driven approach to do just that. In this session, I will show you what Spec Kit is all about, and of course, I will not do this by showing you a lot of slides, but during the session, we will live-code some functionality for a new and existing application.\n\nAt the end of the session, you will have a good understanding of what Spec Kit is all about and what it can do for your software development process.\n\nYou come join me during this session to see the next step in AI-supported software development."},
  {d:"thu",t:"11:40 – 12:40",room:"Room 2",title:"Platform Engineering in the age of Generative AI",sp:"Will Velida",id:"0d9is6irccr",url:"https://ndccopenhagen.com/agenda/platform-engineering-in-the-age-of-generative-ai-0160/0d9is6irccr",desc:"Establishing a platform that serves the needs of your developers is a challenge for teams of all sizes. But with Generative AI tools like GitHub Copilot, surely this is now all easy, and all we need is a few prompts, right?\n\nWell, no, not really. Your onboarding processes are probably poorly documented, the tools your developers use on a day-to-day basis vary wildly between teams, and the way your teams deploy to production vary from dated bash scripts to crossed fingers over beers on Friday. Hardly the solid context needed for generative AI to actually be helpful.\n\nIn this talk, we’ll explore how platform engineering and generative AI can work together to improve developer experience, if you get the foundations right. We’ll look at common organisational and cultural challenges that limit productivity, and how to start addressing them with simple, practical steps. From there, we’ll show how “everything-as-code” patterns and AI-assisted tooling can accelerate platform maturity and reduce friction across teams.\n\nWhether you’re a platform engineer, developer, or tech leader, you’ll leave with a clearer view of how to build a platform that AI can actually help with, and how to make your developers happier in the process."},
  {d:"thu",t:"11:40 – 12:40",room:"Room 3",title:"POC Prison: Why agentic systems never escape the lab and how to fix that in 90 days",sp:"Luise Freese",id:"03ugt804tnn",url:"https://ndccopenhagen.com/agenda/poc-prison-why-agentic-systems-never-escape-the-lab-and-how-to-fix-that-in-90-days-0bq6/03ugt804tnn",desc:"Most organizations experimenting with agentic AI aren’t blocked by models, frameworks, or orchestration. They’re blocked by something far more basic: the everyday realities of how enterprises actually work.\n\nAgents look brilliant in controlled demos, but the moment you try to plug them into real systems (legacy data, governance, identity, compliance, and unclear ownership) they collapse into the same pile of abandoned POCs as everything else.\n\nMy talk cuts through the hype and gets straight to the uncomfortable truth:\n\n- why agentic systems end up as flashy prototypes instead of production tools,\n- how Excel-based “data estates” quietly choke autonomy before it even starts,\n- why most so-called “AI use cases” are still rule-based automation wearing an AI sticker, and\n- how to build the minimal delivery backbone needed for any intelligent agent to run safely in a real enterprise.\n\nThis isn’t yet another vision talk, but the reality check most teams never get: the engineering and organizational work required to move agents from the lab into the world where the constraints are real and the stakes are even higher.\n\nCare about getting agentic systems running rather than demoing? This session gives you the hard truths and the practical steps to finally make that possible."},
  {d:"thu",t:"11:40 – 12:40",room:"Room 4",title:"AI Agents In-Depth – Function Calling, MCP and Tool Use Under the Hood",sp:"Alan Smith",id:"02rpn8tyeu8",url:"https://ndccopenhagen.com/agenda/ai-agents-in-depth-function-calling-mcp-and-tool-use-under-the-hood-0448/02rpn8tyeu8",desc:"Agentic AI enables large language models to use tools to interact beyond system boundaries. From no-code implementations in Copilot Studio to developing sophisticated solutions using LangChain and Semantic Kernel, developers of all levels can leverage tools to create agentic solutions.\n\nBut how does agentic AI work under the hood?\nHow are models able to understand when to use a tool and how to use it?\n\nIn this demo intensive session Alan will explain the concepts of agentic AI in detail. Starting with the basics of function calling in the Open AI models, he will cover the techniques used to provide tools to models, and how the models are able to understand and use the tools. The use of prompting to guide models and improve tool call behavior will be covered, along with guidelines for adding tools to your solution. Alan will also cover the protocols used by Open AI models as well as how the model context protocol is used to provide compatibility between services and LLM solutions.\n\nJoin this session if you want to understand what goes on under the hood of function calling, MCP and agentic AI."},
  {d:"thu",t:"11:40 – 12:40",room:"Room 5",title:"Secure coding in the age of AI",sp:"Mariam reba Alexander",id:"0se2qzx4j7d",url:"https://ndccopenhagen.com/agenda/secure-coding-in-the-age-of-ai-0ini/0se2qzx4j7d",desc:"In this age, we see an explosion in the use of AI-powered applications. AI has also enabled non-technical people without prior coding experience to write code.\n\nThis is a major concern, especially from a security perspective, because there is no guarantee that secure coding practices are followed or that the code is reviewed for design flaws, which usually require expert human oversight beyond AI.\n\nThis problem becomes even more serious when you look at recent npm supply chain attacks, particularly typosquatting attacks, where malicious packages are deliberately named to look like popular libraries. AI-generated code that blindly suggests or auto-inserts dependencies without proper review can easily pull in these malicious packages, indirectly contributing to such attacks. When developers trust AI output without verifying package names, maintainers, or reputations, they increase the risk of introducing compromised dependencies into their applications.\n\nIn this talk, I will discuss common application vulnerabilities, how to prevent them, and cover foundational secure coding practices to follow during web development. I will also address how to rigorously review AI-generated code and its dependencies, especially third-party packages, before deploying anything to production."},

  {d:"thu",t:"13:40 – 14:40",room:"Room 1",title:"Stop writing software like it's 1999!",sp:"Hannes Lowette",id:"05ftuz1hh6l",url:"https://ndccopenhagen.com/agenda/stop-writing-software-like-its-1999-0p6u/05ftuz1hh6l",desc:"Everyone keeps telling me we're in a fast-paced industry. But after spending 2 decades working in it, I'm not so sure. Even though our tools are ever better, we keep doing the same things.\n\nBest case, that means we're not fully taking advantage of recent possibilities, worst case we're looking at higher operating costs and increased manpower spend.\n\nWith access to public clouds for over a decade, our performance hasn't depended on a single, beefy CPU in a long time. The cloud fundamentally changed how compute is made available to us, but that also means we should be adopting new programming models. Yet, I still see numerous teams using pre-cloud paradigms to develop new applications with approaches meant to work around constraints that belong to a distant past. Similar things can be said about how we deal with storage, architectures, etc.\n\nIn this talk, we'll explore some popular design choices and discover how they address problems that no longer exist. We'll also discuss what alternative approaches you could take, so that next time you design a component or system, you a freed from the shackles of the past."},
  {d:"thu",t:"13:40 – 14:40",room:"Room 2",title:"Put an Agent Inside Your App in 10 Minutes or Less with the GitHub Copilot SDK",sp:"Daniel Ward",id:"0klc4metjqp",url:"https://ndccopenhagen.com/agenda/put-an-agent-inside-your-app-in-10-minutes-or-less-with-the-github-copilot-sdk-0db5/0klc4metjqp",desc:"What if adding a custom AI agent to your app took less time than your next standup?\n\nCustom AI solutions for your company used to require a dedicated team and a big budget. Now, with the GitHub Copilot SDK, you can embed AI capabilities that understand your enterprise domain knowledge, tools, and workflows in an afternoon.\n\nThis session shows you how to go from zero to a working AI agent embedded in your application in 10 minutes or less, live on stage. We'll cover how to set up the tools, why you might want to use the Copilot SDK, and what kind of agents you can build with it. You'll leave with working knowledge of how to use the GitHub Copilot SDK to put Copilot's capabilities into your existing applications today.\n\nThe live demo will be in C#, but the SDK is in a variety of languages, so the knowledge is transferable."},
  {d:"thu",t:"13:40 – 14:40",room:"Room 3",title:"Responsibly Abandoning Open Source Projects",sp:"Jason Turner",id:"0yglxs170wl",url:"https://ndccopenhagen.com/agenda/responsibly-abandoning-open-source-projects-09zg/0yglxs170wl",desc:"If you're a developer, you probably have many open source projects. Maybe dozens, maybe even hundreds!\n\nWhat happens to all of those projects that have been started and then abandoned?\n\nWhat does it even mean to abandon a project? If the project was last stable and working when you left it, is it not just dormant?\n\nIn this talk we'll discuss Best Practices for Open Source development and how to create a stable project that you can walk away from for months or years at a time and anyone, including yourself, can come back to with minimal pain!"},
  {d:"thu",t:"13:40 – 14:40",room:"Room 4",title:"AI-Powered Gamification for the Web",sp:"Courtney Yatteau",id:"083x0fh6918",url:"https://ndccopenhagen.com/agenda/ai-powered-gamification-for-the-web-0djq/083x0fh6918",desc:"AI can make gamification feel personal and responsive, without turning your app into a giant game engine.\n\nIn this session, we'll build a set of small, practical features you can drop into real web apps: dynamic story beats, sentiment-aware feedback, and adaptive challenge tuning that reacts to player behavior.\n\nYou'll see how to wire these features into a modern JavaScript app with lightweight demos that focus on patterns you can reuse in real apps."},
  {d:"thu",t:"13:40 – 14:40",room:"Room 5",title:"Lightning Talks 2",sp:"Anna Kvashchuk · Kristoffer Strube · Mackenzie Jackson",id:"0i8h9hghhaq",url:"https://ndccopenhagen.com/agenda/lightning-talks-2-0apt/0i8h9hghhaq",desc:"Lightning talks (approx 10-15 minutes each)\n\nTalk 1: How to make an internal conference worth our time - Anna Kvashchuk\nEffective collaboration is vital in any forward-thinking organization, but it rarely can be established top-down. The developer community at Equinor took a bottom-up approach to make our annual internal conference consistently amazing, with 200 sign-ups within the first hour in 2024. As one of the organizers, I will share some secrets on how to \"git commit\" and \"git merge\" a conference that provides learning and reinforces the community.\n\nTalk 2: SVGs, ah yes the crazy files with XML that make pretty figures - Kristoffer Strube\nI'm sure most people have used an SVG at some point. Some may even have peeked inside the file, only to scream from the overwhelming jumble of numbers and letters.\nIn this lightning talk, we will demystify SVGs and show how you can make a simple SVG yourself!\n\nTalk 3: Vibes Not Vulns: Securing the Era of AI-Written Software - Mackenzie Jackson\nibe coding is here.\n\nDevelopers are shipping production applications built in hours with tools like Copilot, Claude, Cursor, and autonomous coding agents. The vibes are great…. until the vulnerabilities show up in prod.\n\nAI-written software introduces an entirely new failure mode: code that works perfectly, looks legitimate… and quietly ships insecure patterns, hallucinated packages, exposed secrets, and unreviewed attack paths.\n\nIn this talk, we’ll break down what “vibe coded applications” mean for security teams, why traditional AppSec pipelines aren’t ready, and how attackers are already exploiting this shift, from dependency hallucinations to prompt injection in AI-powered CI/CD workflows.\n\nDrawing from real-world research at Aikido Security, we’ll explore:\n\n- The most common vulnerability patterns in AI-generated code\n- Why AI agents turn untrusted input into an execution vector\n- How supply chain attacks evolve when code is written at machine speed\n- Practical guardrails: least privilege, human-in-the-loop review, policy enforcement, and secure-by-default AI workflows\n\nVibe coding is inevitable.\n\nShipping vulns doesn’t have to be."},

  {d:"thu",t:"15:00 – 16:00",room:"Room 1",title:"Building a real-time collaborative editor",sp:"Mihaela Gheorghe-Roman",id:"0ch703j294x",url:"https://ndccopenhagen.com/agenda/building-a-real-time-collaborative-editor-0npj/0ch703j294x",desc:"Have you ever wondered what it takes to develop a solution similar to Google Docs and then build on top of it with extra layers of security and functionality?\n\nDuring the planning phase of a military operation, there are multiple text documents that need to be updated simultaneously by multiple users. At the same time, there is a requirement to provide security in air-gapped deployments.\n\nAs such, a solution that follows high standards for security, performance and quality is required.\n\nWithin my presentation, I will be describing an embedded solution based on advanced operational transformation algorithms which allows real-time secure collaborative editing, as well as several challenges that we have faced during development and how we managed to overcome each of them."},
  {d:"thu",t:"15:00 – 16:00",room:"Room 2",title:"A Python and a Viking King - How Computer Stuff Got Named",sp:"Simon Painter",id:"0cqylreo8j2",url:"https://ndccopenhagen.com/agenda/a-python-and-a-viking-king-how-computer-stuff-got-named-01ln/0cqylreo8j2",desc:"We use all sorts of strange words in the tech world, and you'd think they were all new words from the modern era, but surprisingly they aren't!\n\nYou'd be astonished by just how many words we use in tech every day are actually older than the invention of computers themselves!\n\nIn this talk, I'm going to tell you all sorts of strange stories from ancient history, popular culture and other very strange places to show you where it is the words we use in our work lives actually come from.\n\nThese include:\n\n* How \"bugs\" have nothing to do with insects\n* The curious connection between a viking warlord, a hollywood starlet and modern computer tech\n\" What is a hacker? And what does it have to do with horses?\n* Why is a developer nothing at all like a fajita?\n* What is a C and why is it sharp?\n\nAll this, and much, much. more!"},
  {d:"thu",t:"15:00 – 16:00",room:"Room 3",title:"Building an AI-Powered Personal Companion Mobile App",sp:"Gerald Versluis",id:"0cp0y5eiqre",url:"https://ndccopenhagen.com/agenda/building-an-ai-powered-personal-companion-mobile-app-0gon/0cp0y5eiqre",desc:"Ever wondered how to integrate AI into your cross-platform apps?\n\nIn this session, we'll explore building an AI-powered companion app using .NET MAUI. We'll harness the capabilities of .NET MAUI to create a seamless user experience across platforms and integrate AI functionalities to make our app smarter and more responsive.\n\nYou will walk away with all the knowledge you need to build your own personal Jarvis, whether you want to get personalized book recommendations, crazy roadtrip ideas or get food recipe ideas... After this session you can build it all!"},
  {d:"thu",t:"15:00 – 16:00",room:"Room 4",title:"ASP.NET Core Authentication - The Dirty Details",sp:"Chris Klug",id:"0751hvra6gw",url:"https://ndccopenhagen.com/agenda/aspnet-core-authentication-the-dirty-details-096d/0751hvra6gw",desc:"Think you understand ASP.NET Core authentication? Adorable. In this session, we’ll peel back the nice, developer-friendly abstractions you normally work with and dive head‑first into the tangled \"stuff\" lurking underneath.\n\nWe’ll go crawling through handlers, schemes, events, and the various moving parts that somehow work together to decide (how the system decides) who you are and what you can do. This talk won’t just show you _how_ things work, but also _why_ they often work, and why understanding the internals can save you hours of “why is this happening?” therapy.\n\nExpect a deeply technical (level 300–400) exploration that embraces the weird corners of the authentication pipeline most developers never see. Sure, knowing these details will not change your day to day life, but they will make you a more confident, better equipped developer and maybe even give you a few things to laugh about the next time authentication goes sideways. And if you have ever been trapped in a login loop that felt like the system had decided to gaslight you personally, you will walk away knowing exactly why it happened."},
  {d:"thu",t:"15:00 – 16:00",room:"Room 5",title:"Write Drunk, Edit Sober: Creating Generative Content Responsibly",sp:"Matthijs van der Veer",id:"0l6mged8vja",url:"https://ndccopenhagen.com/agenda/write-drunk-edit-sober-creating-generative-content-responsibly-01e9/0l6mged8vja",desc:"Let's examine the growing concern over low-quality generative AI content and explore how we can build automated systems that produce high-quality output.\n\nYou’ll learn to identify the signs of 'AI Slop' and implement strategies that counteract our automation bias, ensuring that the content we create meets the standards we expect. Using session abstract generation as a case study, I will provide practical guidelines to elevate the quality of your AI-generated content.\n\nThis talk is designed for developers and IT professionals who are dedicated to improving the quality of AI-driven content in their organisations. Get ready to roll up your sleeves and discover how a little effort can lead to significant improvements in the content we create."},

  {d:"thu",t:"16:20 – 17:20",room:"Expo",title:"Locknote: Reasons to be Cheerful: 0, 1, 2",sp:"Emmz Rendle",id:"0fo4kg7oc7a",url:"https://ndccopenhagen.com/agenda/reasons-to-be-cheerful-0-1-2-0e7n/0fo4kg7oc7a",desc:"Are you worried about AI taking your job?\n\nOr that all these datacentres are going to melt the icecaps and plunge us into a global catastrophe? Or that Mark Zuckerberg continues to be? Me too! But while we wait for those things to happen, here are some more positive trends and stories in the world of technology and software engineering to make you feel a bit better about it all, delivered with enormous smiles and giggles by the irrepressibly happy Rendle."},
];

const KEY = "ndc_cph_2026_favs";
let favs = new Set();
try { favs = new Set(JSON.parse(localStorage.getItem(KEY) || "[]")); } catch(e){}

let day = "wed";
let favsOnly = false;
const expanded = new Set();

function save(){ try { localStorage.setItem(KEY, JSON.stringify([...favs])); } catch(e){} }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// Render a raw abstract into paragraphs and bullet lists.
// Blocks are separated by blank lines; a block whose lines start with "- " becomes a <ul>.
function renderDesc(text){
  const blocks = text.split(/\n{2,}/).map(b => b.trim()).filter(Boolean);
  let out = "";
  for (const block of blocks){
    const lines = block.split("\n");
    const bulletLines = lines.filter(l => /^\s*[-•]\s+/.test(l));
    if (bulletLines.length && bulletLines.length === lines.length){
      out += "<ul>" + lines.map(l =>
        `<li>${esc(l.replace(/^\s*[-•]\s+/, ""))}</li>`).join("") + "</ul>";
    } else if (bulletLines.length){
      // Mixed: intro line(s) then bullets.
      let buf = [], inList = false;
      const flush = () => { if (buf.length){ out += `<p>${buf.map(esc).join("<br>")}</p>`; buf = []; } };
      for (const l of lines){
        if (/^\s*[-•]\s+/.test(l)){
          if (!inList){ flush(); out += "<ul>"; inList = true; }
          out += `<li>${esc(l.replace(/^\s*[-•]\s+/, ""))}</li>`;
        } else {
          if (inList){ out += "</ul>"; inList = false; }
          buf.push(l);
        }
      }
      if (inList) out += "</ul>"; else flush();
    } else {
      out += `<p>${lines.map(esc).join("<br>")}</p>`;
    }
  }
  return out;
}

function render(){
  const app = document.getElementById("app");
  let list = TALKS.filter(t => t.d === day);
  if (favsOnly) list = list.filter(t => favs.has(t.id));

  if (list.length === 0){
    app.innerHTML = `<div class="empty"><span>☆</span>${favsOnly ? "No favourites for this day yet.<br>Tap the star on a talk to add one." : "No talks."}</div>`;
    return;
  }

  let html = "", lastSlot = null;
  for (const t of list){
    if (t.t !== lastSlot){
      html += `<div class="slot-time">${t.t}</div>`;
      lastSlot = t.t;
    }
    const on = favs.has(t.id);
    const expo = t.room === "Expo" ? " expo" : "";
    const open = expanded.has(t.id);
    const descHtml = t.desc
      ? renderDesc(t.desc)
      : `<p class="none">Tap below to read the full abstract on the NDC site.</p>`;
    html += `
      <div class="talk${on ? " fav" : ""}${open ? " open" : ""}">
        <div class="talk-body" data-toggle="${t.id}">
          <div class="talk-meta"><span class="room${expo}">${esc(t.room)}</span></div>
          <div class="title">${esc(t.title)}</div>
          <div class="speaker">${esc(t.sp)}<span class="chev">▶</span></div>
          <div class="desc"><div class="desc-inner">
            ${descHtml}
            <a class="more" href="${t.url}" target="_blank" rel="noopener">Full abstract &amp; speaker bio on NDC ↗</a>
          </div></div>
        </div>
        <button class="star-btn${on ? " on" : ""}" data-id="${t.id}" aria-label="Toggle favourite">${on ? "★" : "☆"}</button>
      </div>`;
  }
  app.innerHTML = html;
}

document.getElementById("app").addEventListener("click", e => {
  const star = e.target.closest(".star-btn");
  if (star){
    const id = star.dataset.id;
    if (favs.has(id)) favs.delete(id); else favs.add(id);
    save();
    render();
    return;
  }
  // let the title / "more" links navigate normally
  if (e.target.closest("a")) return;
  const body = e.target.closest(".talk-body");
  if (!body) return;
  const id = body.dataset.toggle;
  if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
  body.closest(".talk").classList.toggle("open");
});

document.getElementById("dayseg").addEventListener("click", e => {
  const b = e.target.closest("button");
  if (!b) return;
  day = b.dataset.day;
  document.querySelectorAll("#dayseg button").forEach(x => x.classList.toggle("active", x === b));
  render();
});

document.getElementById("favToggle").addEventListener("click", e => {
  favsOnly = !favsOnly;
  e.currentTarget.classList.toggle("on", favsOnly);
  render();
});

render();
</script>
</body>
